name: FileXplorer
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "16.0"
targets:
  FileXplorer:
    type: application
    platform: iOS
    sources:
      - Sources/FileXplorer
    info:
      path: Sources/FileXplorer/Info.plist
      properties:
        NSCameraUsageDescription: "영업·현장 사진을 보관함에 촬영해 저장하기 위해 카메라를 사용합니다. 촬영한 사진은 기본 '사진' 앱에 저장되지 않습니다."
        NSFaceIDUsageDescription: "보관함의 사진을 잠금 해제하기 위해 Face ID를 사용합니다."
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.filexplorer
    dependencies:
      - package: ZIPFoundation
  FileXplorerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.filexplorerTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: FileXplorer
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
schemes:
  FileXplorer:
    build:
      targets:
        FileXplorer: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FileXplorerTests
